<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>Chemical Engineering Club</title>\n    <style>\n        body {\n            margin: 0;\n            font-family: Arial, sans-serif;\n            overflow: hidden;\n        }\n        .hero {\n            height: 100vh;\n            width: 100%;\n            background: url('animated_background.gif') no-repeat center center fixed;\n            background-size: cover;\n            display: flex;\n            justify-content: center;\n            align-items: center;\n            position: relative;\n            animation: fadein 5s;\n        }\n        @keyframes fadein {\n            from { opacity: 0; }\n            to   { opacity: 1; }\n        }\n        nav {\n            position: absolute;\n            top: 20px;\n            left: 20px;\n            background: rgba(255, 255, 255, 0.8);\n            padding: 10px;\n            border-radius: 5px;\n        }\n        nav a {\n            margin: 0 10px;\n            text-decoration: none;\n            color: #333;\n        }\n        .logo {\n            animation: rotate 5s infinite linear;\n        }\n        @keyframes rotate {\n            from { transform: rotateY(0deg); }\n            to { transform: rotateY(360deg); }\n        }\n        .content {\n            padding: 20px;\n        }\n    </style>\n</head>\n<body>\n    <nav>\n        <a href="#about">About</a>\n        <a href="#events">Events</a>\n        <a href="#join">Join Us</a>\n    </nav>\n    <div class="hero">\n        <img src="logo.png" alt="Chemical Engineering Club Logo" class="logo" width="200">\n    </div>\n    <div class="content">\n        <section id="about">\n            <h1>About Us</h1>\n            <p>Welcome to the Chemical Engineering Club!</p>\n        </section>\n        <section id="events">\n            <h2>Upcoming Events</h2>\n            <p>Stay tuned for our next events!</p>\n        </section>\n        <section id="join">\n            <h2>Join Us</h2>\n            <p>Become a member today!</p>\n        </section>\n    </div>\n</body>\n</html>
